<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistem Pengajuan Bariklana</title>

  <link rel="icon"           type="image/x-icon" href="favicon.ico" />
  <link rel="icon"           type="image/png"    href="favicon.png"    sizes="32x32" />
  <link rel="icon"           type="image/png"    href="favicon-16.png" sizes="16x16" />
  <link rel="apple-touch-icon"                   href="favicon-180.png" />

  <meta property="og:title"       content="Bariklana | Sistem Pengajuan" />
  <meta property="og:description" content="Sistem Pengajuan Keuangan PT Bariklana Catering Aqiqah" />
  <meta property="og:image"       content="favicon-180.png" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; width: 100%; overflow: hidden;
      background: #f0faf4; font-family: "Segoe UI", Arial, sans-serif;
    }

    #loading {
      position: fixed; inset: 0; background: #f0faf4;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 18px; z-index: 999;
      transition: opacity 0.4s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #c3e6cc; border-top-color: #00a862;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-brand { font-size: 1.3rem; font-weight: 800; color: #006c40; }
    .loading-label { font-size: 0.92rem; color: #5a7a65; font-weight: 600; }

    #appFrame {
      width: 100%; height: 100%; border: none; display: block;
      opacity: 0; transition: opacity 0.35s ease;
    }
    #appFrame.visible { opacity: 1; }
  </style>
</head>
<body>

<div id="loading">
  <div class="loading-brand">Sistem Pengajuan Bariklana</div>
  <div class="spinner"></div>
  <div class="loading-label" id="loadingLabel">Memuat aplikasi...</div>
</div>

<iframe id="appFrame" src="" title="Bariklana | Sistem Keuangan"></iframe>

<script>
  // ==============================================================
  //  KONFIGURASI — ISI SESUAI MILIKMU (hanya GAS_BASE_URL)
  //  PAGES_BASE_URL tidak perlu diisi — dibaca otomatis dari URL
  // ==============================================================
  var GAS_BASE_URL = "https://script.google.com/macros/s/AKfycbwoVP0iifamsqzd6Yg5Pjw5KR5SIdWR8OwFEAFtQur90G3nimBewgpyJZ5n_eb9DxOg/exec";

  // Baca URL GitHub Pages saat ini secara otomatis (tanpa ?nav= dan trailing slash)
  var PAGES_BASE_URL = window.location.origin + window.location.pathname.replace(/\/$/, "").replace(/\/index\.html$/, "");

  // ==============================================================
  //  MAP HALAMAN GAS
  // ==============================================================
  var PAGE_MAP = {
    "Pengajuan" : GAS_BASE_URL,
    "Dashboard" : GAS_BASE_URL + "?page=Dashboard",
    "LPJ"       : GAS_BASE_URL + "?page=LPJ"
  };

  var PAGE_LABELS = {
    "Pengajuan" : "Memuat Form Pengajuan...",
    "Dashboard" : "Memuat Dashboard Analitik...",
    "LPJ"       : "Memuat Form LPJ..."
  };

  var frame        = document.getElementById("appFrame");
  var loading      = document.getElementById("loading");
  var loadingLabel = document.getElementById("loadingLabel");

  // ==============================================================
  //  SHOW / HIDE LOADING
  // ==============================================================
  function showLoading(label) {
    loadingLabel.textContent  = label || "Memuat halaman...";
    loading.style.display     = "flex";
    loading.style.opacity     = "1";
    loading.classList.remove("hidden");
    frame.classList.remove("visible");
  }

  function hideLoading() {
    loading.classList.add("hidden");
    frame.classList.add("visible");
    setTimeout(function () {
      if (loading.classList.contains("hidden")) {
        loading.style.display = "none";
      }
    }, 450);
  }

  // ==============================================================
  //  NAVIGASI — ganti src iframe, URL browser tetap di GitHub Pages
  // ==============================================================
  function loadPage(page) {
    var gasUrl    = PAGE_MAP[page] || PAGE_MAP["Pengajuan"];
    var separator = (gasUrl.indexOf("?") !== -1) ? "&" : "?";

    // Kirim PAGES_BASE_URL ke GAS agar PropertiesService tahu
    // (sebagai fallback jika postMessage tidak bisa dipakai suatu saat)
    var fullUrl = gasUrl + separator + "pagesUrl=" + encodeURIComponent(PAGES_BASE_URL);

    showLoading(PAGE_LABELS[page] || "Memuat halaman...");
    frame.src = fullUrl;
  }

  // ==============================================================
  //  LISTENER postMessage DARI GAS (iframe)
  //  GAS mengirim string "nav:Dashboard" / "nav:LPJ" / "nav:Pengajuan"
  //  Format string (bukan object) lebih andal menembus GAS CSP
  // ==============================================================
  window.addEventListener("message", function (event) {
    var data = event.data;

    // Terima string "nav:X"
    if (typeof data === "string" && data.indexOf("nav:") === 0) {
      var page = data.replace("nav:", "");
      if (PAGE_MAP[page]) {
        loadPage(page);
      }
      return;
    }

    // Terima object { bariklanaNav: "X" } sebagai fallback
    if (data && typeof data === "object" && data.bariklanaNav) {
      var page = data.bariklanaNav;
      if (PAGE_MAP[page]) {
        loadPage(page);
      }
    }
  });

  // ==============================================================
  //  INIT — baca ?nav= dari URL saat pertama buka
  // ==============================================================
  function getNavParam() {
    var params = new URLSearchParams(window.location.search);
    return params.get("nav") || "Pengajuan";
  }

  var currentPage = getNavParam();
  loadPage(currentPage);

  // Sembunyikan loading saat iframe selesai load
  frame.addEventListener("load", function () {
    hideLoading();
  });

  // Fallback: paksa hide setelah 12 detik
  setTimeout(function () {
    loading.classList.add("hidden");
    frame.classList.add("visible");
  }, 12000);
</script>

</body>
</html>
