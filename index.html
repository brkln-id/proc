<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistem Pengajuan Keuangan</title>

  <!-- =============================================
       FAVICON
       Letakkan file-file ini di root repo GitHub
       bersama index.html
       ============================================= -->
  <link rel="icon"           type="image/x-icon" href="favicon.ico" />
  <link rel="icon"           type="image/png"    href="favicon.png"    sizes="32x32" />
  <link rel="icon"           type="image/png"    href="favicon-16.png" sizes="16x16" />
  <link rel="apple-touch-icon"                   href="favicon-180.png" />

  <!-- Open Graph -->
  <meta property="og:title"       content="Sistem Pengajuan Keuangan" />
  <meta property="og:description" content="Sistem Pengajuan Keuangan PT Bariklana Catering Aqiqah" />
  <meta property="og:image"       content="favicon-180.png" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #f0faf4;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    /* ── LOADING SCREEN ── */
    #loading {
      position: fixed;
      inset: 0;
      background: #f0faf4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 999;
      transition: opacity 0.4s ease;
    }
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #c3e6cc;
      border-top-color: #00a862;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-brand {
      font-size: 1.3rem;
      font-weight: 800;
      color: #006c40;
      letter-spacing: 0.5px;
    }
    .loading-label {
      font-size: 0.92rem;
      color: #5a7a65;
      font-weight: 600;
    }

    /* ── IFRAME ── */
    #appFrame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    #appFrame.visible {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="loading">
    <div class="loading-brand">Sistem Pengajuan Keuangan</div>
    <div class="spinner"></div>
    <div class="loading-label" id="loadingLabel">Memuat aplikasi...</div>
  </div>

  <!-- =============================================
       GANTI src dengan URL deployment GAS kamu
       Format:
       https://script.google.com/macros/s/AKfycbwoVP0iifamsqzd6Yg5Pjw5KR5SIdWR8OwFEAFtQur90G3nimBewgpyJZ5n_eb9DxOg/exec
       ============================================= -->
  <iframe
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbwoVP0iifamsqzd6Yg5Pjw5KR5SIdWR8OwFEAFtQur90G3nimBewgpyJZ5n_eb9DxOg/exec"
    allow="forms"
    title="Sistem Pengajuan Keuangan"
  ></iframe>

  <script>
    // =====================================================
    //  KONFIGURASI — Ganti DEPLOY_ID sesuai milikmu
    // =====================================================
    var GAS_BASE_URL = "https://script.google.com/macros/s/AKfycbwoVP0iifamsqzd6Yg5Pjw5KR5SIdWR8OwFEAFtQur90G3nimBewgpyJZ5n_eb9DxOg/exec";

    var frame        = document.getElementById("appFrame");
    var loading      = document.getElementById("loading");
    var loadingLabel = document.getElementById("loadingLabel");

    // ── Map nama page ke URL GAS ──
    var PAGE_URLS = {
      "Pengajuan" : GAS_BASE_URL,
      "Dashboard" : GAS_BASE_URL + "?page=Dashboard",
      "LPJ"       : GAS_BASE_URL + "?page=LPJ"
    };

    // ── Tampilkan loading screen saat ganti halaman ──
    function showLoading(label) {
      loadingLabel.textContent = label || "Memuat halaman...";
      loading.classList.remove("hidden");
      frame.classList.remove("visible");
    }

    // ── Sembunyikan loading saat iframe siap ──
    function hideLoading() {
      loading.classList.add("hidden");
      frame.classList.add("visible");
      setTimeout(function () { loading.style.display = "none"; }, 450);
    }

    // ── Navigasi: ganti src iframe tanpa keluar dari GitHub Pages ──
    function navigateTo(page) {
      var url = PAGE_URLS[page];
      if (!url) return;

      var labels = {
        "Pengajuan" : "Memuat Form Pengajuan...",
        "Dashboard" : "Memuat Dashboard Analitik...",
        "LPJ"       : "Memuat Form LPJ..."
      };

      loading.style.display = "flex"; // pastikan display kembali flex
      showLoading(labels[page] || "Memuat halaman...");

      frame.src = url;
    }

    // ── Terima pesan navigasi dari dalam iframe (GAS pages) ──
    window.addEventListener("message", function (event) {
      // Validasi: hanya proses pesan dari domain GAS
      if (!event.origin.includes("google.com") &&
          !event.origin.includes("googleusercontent.com")) return;

      var data = event.data;
      if (data && data.bariklanaNav) {
        navigateTo(data.bariklanaNav);
      }
    });

    // ── Loading saat iframe pertama kali selesai load ──
    frame.addEventListener("load", function () {
      hideLoading();
    });

    // ── Fallback: paksa hide loading setelah 10 detik ──
    setTimeout(function () {
      loading.classList.add("hidden");
      frame.classList.add("visible");
    }, 10000);
  </script>

</body>
</html>
